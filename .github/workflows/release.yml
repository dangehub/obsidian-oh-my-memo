name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package release assets
        run: |
          mkdir release
          cp main.js manifest.json styles.css release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## OhMyMemo ${{ github.ref_name }}

            Markdown-native Obsidian plugin for daily quick records, flash thoughts, and todos.
